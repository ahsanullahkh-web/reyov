<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REYOV - Ultimate Stream Engine</title>
    <style>
        /* CORE REYOV ROOT CONSTRUCT MATRIX */
        body {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            overflow-x: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* SCREEN SPLASH FRAMEWORK */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease;
        }
        .splash-logo {
            font-size: 48px;
            font-weight: 900;
            color: #ff0055;
            letter-spacing: 5px;
            text-shadow: 0 4px 15px rgba(255,0,85,0.4);
        }

        /* FIXED MAIN HEADER FRAME */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #ffffff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 1500;
        }
        .logo-text {
            color: #ff0055;
            font-size: 26px;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .search-bar-container {
            flex: 1;
            max-width: 450px;
            margin: 0 15px;
        }
        .search-input {
            width: 100%;
            padding: 11px 20px;
            border-radius: 25px;
            border: 1px solid #e5e5e5;
            background-color: #f7f7f7;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 10px 18px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        .btn-video { background-color: #ff0055; color: white; }
        .btn-short { background-color: #ff9900; color: white; }
        .btn-profile { background-color: #000000; color: white; }

        /* ENGINE TAB FILTERS FIXED STATIONS */
        .filter-container {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px 10px;
            background: #ffffff;
            z-index: 1400;
            box-sizing: border-box;
            border-bottom: 1px solid #eeeeee;
        }
        .filter-pill {
            padding: 9px 22px;
            background-color: #f0f0f0;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            color: #444;
            transition: all 0.2s ease;
        }
        .filter-pill.active {
            background-color: #ff0055;
            color: white;
            box-shadow: 0 4px 10px rgba(255,0,85,0.2);
        }

        /* HORIZONTAL SWIPE VIEWPORT PIPELINE */
        .swipe-viewport-wrapper {
            width: 100vw;
            margin-top: 148px; 
            overflow: hidden;
            position: relative;
        }
        .swipe-track-container {
            display: flex;
            width: 300vw; 
            transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }
        .view-panel-section {
            width: 100vw;
            box-sizing: border-box;
            padding: 15px;
            min-height: 80vh;
        }
        .section-title {
            font-size: 19px;
            font-weight: 800;
            margin-bottom: 18px;
            border-left: 5px solid #ff0055;
            padding-left: 12px;
            letter-spacing: -0.5px;
        }

        /* GRID CONSTRUCTS WITH FIXED LAYOUT DIMENSIONS */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1440px;
            margin: 0 auto;
        }
        .media-card {
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: width 0.3s ease;
        }
        
        /* PREVIEW FRAME WRAPPERS (LAMBI VERTICAL STYLING DESIGN BY DEFAULT) */
        .media-preview-box {
            width: 100%;
            height: 420px; 
            background: #000000;
            position: relative;
            overflow: hidden;
            transition: height 0.3s ease;
        }
        
        /* SHORTS FRAME (MOBILE SCREEN TYPE DIMENSIONS) */
        .media-card.short-layout-type .media-preview-box {
            height: 520px; 
        }

        .media-preview-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* CUSTOM CONTROLS OVERLAY FOR SCREEN SIZE MANIPULATION */
        .size-controller-hud {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }
        .size-hud-btn {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }
        .size-hud-btn:hover { background: #ff0055; }

        .custom-thumbnail-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            pointer-events: none;
        }
        
        /* ENGAGEMENT MATRIX ROW ARCHITECTURE */
        .interaction-panel-track {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fdfdfd;
            border-top: 1px solid #f5f5f5;
            border-bottom: 1px solid #f5f5f5;
        }
        .engagement-action-btn {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            border: 1px solid #e0e0e0;
            background: #ffffff;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }
        .engagement-action-btn.active-fired {
            background: #ff0055 !important;
            color: #ffffff !important;
            border-color: #ff0055 !important;
        }
        
        /* COMMENT MATRIX ENGINE STRUCT */
        .comment-module-space {
            padding: 10px 12px;
            background: #ffffff;
        }
        .comment-feed-box {
            max-height: 85px;
            overflow-y: auto;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .comment-node-row {
            padding: 4px 0;
            border-bottom: 1px dashed #f0f0f0;
            word-break: break-all;
        }
        .comment-author-tag { font-weight: 800; color: #ff0055; margin-right: 4px; }
        
        .comment-input-row {
            display: flex;
            gap: 6px;
        }
        .comment-field {
            flex: 1;
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 11px;
            outline: none;
        }
        .comment-send-trigger {
            background: #000;
            color: #fff;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        /* THREE DOT CONTROL HUDS */
        .three-dots-trigger-node {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: 900;
            font-size: 16px;
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .badge-type-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 0, 85, 0.9);
            color: #fff;
            padding: 4px 10px;
            font-size: 9px;
            font-weight: 900;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 4;
        }

        .media-info { padding: 14px; position: relative; }
        .media-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: #111; }
        .media-meta { font-size: 11px; color: #666; font-weight: 600; }

        .empty-state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
            color: #777;
            grid-column: 1 / -1;
        }
        .empty-icon { font-size: 52px; margin-bottom: 12px; }

        /* LAYER POPUPS STAGE CONSOLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px);
            z-index: 2500;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #ffffff;
            width: 92%;
            max-width: 440px;
            border-radius: 20px;
            padding: 26px;
            box-sizing: border-box;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            max-height: 88vh;
            overflow-y: auto;
        }
        .modal-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f5f5f5;
            padding-bottom: 10px;
        }
        .modal-header-text { font-size: 19px; font-weight: 900; color: #111; }
        .btn-top-save { background: #1e7e34; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; }

        .input-group { margin-bottom: 16px; }
        .input-label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 6px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box; }
        
        .visibility-pills-row { display: flex; gap: 10px; margin-top: 5px; }
        .visibility-pill-btn { flex: 1; padding: 12px; border: 2px solid #eee; background: #fff; font-weight: 800; border-radius: 8px; text-align: center; cursor: pointer; font-size: 13px; }
        .visibility-pill-btn.selected-status { border-color: #ff0055 !important; color: #ff0055 !important; background: #fff5f7 !important; }

        .timer-container { text-align: center; padding: 25px 10px; }
        .spinner { width: 44px; height: 44px; border: 4px solid #f3f3f3; border-top: 4px solid #ff0055; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .profile-pic-container { position: relative; width: 85px; height: 85px; margin: 0 auto 12px; cursor: pointer; }
        .profile-pic-view { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #ff0055; background: #eee; }
        .metric-row { display: flex; justify-content: space-around; background: #f8f9fa; border-radius: 12px; padding: 14px 5px; margin: 15px 0; border: 1px solid #eaeaea; }
        .metric-box { text-align: center; }
        .metric-val { font-size: 19px; font-weight: 900; color: #ff0055; }
        .metric-lbl { font-size: 11px; color: #666; font-weight: 700; text-transform: uppercase; }

        .history-list { text-align: left; margin-top: 15px; max-height: 160px; overflow-y: auto; border-top: 1px solid #eee; padding-top: 10px; }
        .history-item { display: flex; justify-content: space-between; font-size: 13px; padding: 9px 5px; border-bottom: 1px solid #f9f9f9; font-weight: 700; }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-block { flex: 1; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; text-align: center; border: none; }
        .btn-submit { background: #000000; color: white; }
        .btn-cancel { background: #f0f0f0; color: #333333; }
        
        .hidden-storage-nodes { display: none !important; }
    </style>
</head>
<body>

    <input type="file" id="media-file-selector" class="hidden-storage-nodes" accept="video/*">
    <input type="file" id="profile-pic-selector" class="hidden-storage-nodes" accept="image/*" onchange="processAvatarFileInjected(this)">
    <input type="file" id="thvip-file-selector" class="hidden-storage-nodes" accept="image/*" onchange="processThvipImageSelected(this)">

    <div class="splash-overlay" id="splash-screen">
        <div class="splash-logo">REYOV</div>
    </div>

    <header>
        <div class="logo-container">
            <a href="#" class="logo-text">⚡ REYOV</a>
        </div>
        <div class="search-bar-container">
            <input type="text" class="search-input" placeholder="Search parameters..." id="search-core">
        </div>
        <div class="action-buttons">
            <button class="btn btn-video" onclick="triggerDeviceMediaFileLookup('video')">📹 VIDEO</button>
            <button class="btn btn-short" onclick="triggerDeviceMediaFileLookup('short')">🎬 SHORT</button>
            <button class="btn btn-profile" onclick="openProfileStudioPanel()">👤 PROFILE</button>
        </div>
    </header>

    <div class="filter-container">
        <div class="filter-pill active" id="pill-all" onclick="jumpToTabSegment(0)">All Feeds</div>
        <div class="filter-pill" id="pill-video" onclick="jumpToTabSegment(1)">Long Videos</div>
        <div class="filter-pill" id="pill-short" onclick="jumpToTabSegment(2)">Shorts Section</div>
    </div>

    <div class="swipe-viewport-wrapper" id="swipe-area-viewport">
        <div class="swipe-track-container" id="swipe-track">
            
            <div class="view-panel-section">
                <div class="section-title">All Media Feeds</div>
                <div class="content-grid" id="grid-all"></div>
            </div>

            <div class="view-panel-section">
                <div class="section-title">Long Length Videos</div>
                <div class="content-grid" id="grid-video"></div>
            </div>

            <div class="view-panel-section">
                <div class="section-title">Speed Shorts Feed</div>
                <div class="content-grid" id="grid-short"></div>
            </div>

        </div>
    </div>

    <div class="modal-overlay" id="system-modal">
        <div class="modal-box" id="modal-box-content"></div>
    </div>

    <script>
        let activeTabIndex = 0;
        let pendingUploadType = "";
        let selectedFileBlobUrl = "";
        
        // REYOV LIVE RUNTIME LOCAL REGISTRIES (LOADED FROM LOCALSTORAGE SYSTEM MATRIX)
        let dynamicLocalMemoryDB = []; 
        let globalSystemLikesCount = 0;
        let globalSystemSubsCount = 0;

        let editStageBufferState = {
            targetItemId: null,
            tempTitle: "",
            tempVisibility: "publish",
            tempThvipUrl: ""
        };

        let userEngagementRegistry = {
            likesTrack: {},
            subsTrack: {}
        };

        let profileConfigState = {
            name: "REHAN SIR",
            picData: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%23ff0055'/><text x='50%' y='60%' font-size='28' font-weight='bold' fill='white' text-anchor='middle'>RS</text></svg>"
        };

        let touchStartCoordX = 0, touchEndCoordX = 0, touchStartCoordY = 0, touchEndCoordY = 0;

        // HIGH PERFORMANCE LOCALSTORAGE INITIALIZATION ENGINE
        function initLocalStorageDatabaseEngine() {
            try {
                if (localStorage.getItem('reyov_db')) {
                    dynamicLocalMemoryDB = JSON.parse(localStorage.getItem('reyov_db'));
                }
                if (localStorage.getItem('reyov_global_likes')) {
                    globalSystemLikesCount = parseInt(localStorage.getItem('reyov_global_likes'));
                }
                if (localStorage.getItem('reyov_global_subs')) {
                    globalSystemSubsCount = parseInt(localStorage.getItem('reyov_global_subs'));
                }
                if (localStorage.getItem('reyov_engagement_registry')) {
                    userEngagementRegistry = JSON.parse(localStorage.getItem('reyov_engagement_registry'));
                }
                if (localStorage.getItem('reyov_profile_config')) {
                    profileConfigState = JSON.parse(localStorage.getItem('reyov_profile_config'));
                }
            } catch (e) {
                console.error("Local Storage sync lock offline", e);
            }
        }

        function forceCommitStorageSynchronizer() {
            try {
                localStorage.setItem('reyov_db', JSON.stringify(dynamicLocalMemoryDB));
                localStorage.setItem('reyov_global_likes', globalSystemLikesCount.toString());
                localStorage.setItem('reyov_global_subs', globalSystemSubsCount.toString());
                localStorage.setItem('reyov_engagement_registry', JSON.stringify(userEngagementRegistry));
                localStorage.setItem('reyov_profile_config', JSON.stringify(profileConfigState));
            } catch (e) {
                console.error("Data commit failed", e);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            initLocalStorageDatabaseEngine(); // Pull persistent states instantly before layout paint
            
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 400);
                }
            }, 800);
            
            rebuildStratifiedGrids();
            setupTouchNavigationListeners();
            setupFileSelectionTriggers();
        });

        function rebuildStratifiedGrids() {
            const categories = ['all', 'video', 'short'];
            
            categories.forEach((cat) => {
                const targetGrid = document.getElementById(`grid-${cat}`);
                if (!targetGrid) return;
                targetGrid.innerHTML = '';

                let filtered = dynamicLocalMemoryDB.filter(item => {
                    if (item.visibility === 'private') return false;
                    if (cat === 'all') return true;
                    return item.type === cat;
                });

                if (filtered.length === 0) {
                    targetGrid.innerHTML = `
                        <div class="empty-state-container">
                            <div class="empty-icon">📂</div>
                            <div style="font-weight:800; font-size:16px; color:#111;">No Transmissions Live</div>
                            <div style="font-size:12px; margin-top:5px; color:#777;">Platform database reads 0 records. Add ultra 4K clips above to deploy tracks.</div>
                        </div>
                    `;
                } else {
                    filtered.forEach(item => {
                        const card = document.createElement('div');
                        card.className = `media-card ${item.type === 'short' ? 'short-layout-type' : ''}`;
                        
                        const isLiked = userEngagementRegistry.likesTrack[item.id] ? 'active-fired' : '';
                        const isSubbed = userEngagementRegistry.subsTrack[item.id] ? 'active-fired' : '';

                        let thvipImageTag = item.thvip ? `<img src="${item.thvip}" class="custom-thumbnail-layer" id="thvip-layer-${item.id}">` : '';

                        let compiledCommentsHTML = '';
                        item.comments.forEach(c => {
                            compiledCommentsHTML += `
                                <div class="comment-node-row">
                                    <span class="comment-author-tag">${escapeSecurityHTML(c.user)}:</span>
                                    <span>${escapeSecurityHTML(c.text)}</span>
                                </div>
                            `;
                        });

                        let threeDotsMenuHTML = `<div class="three-dots-trigger-node" onclick="openVideoStructuralAdminHUD(${item.id})">⋮</div>`;

                        card.innerHTML = `
                            <div class="badge-type-tag">${item.type}</div>
                            ${threeDotsMenuHTML}
                            
                            <div class="media-preview-box" id="box-wrapper-${item.id}">
                                ${thvipImageTag}
                                <video src="${item.url}" id="video-core-node-${item.id}" controls playsinline loop onplay="hideThvipOverlayPreview(${item.id})"></video>
                                
                                <div class="size-controller-hud">
                                    <div class="size-hud-btn" onclick="modifyVideoScreenBounds(${item.id}, 'big')">📺 Big</div>
                                    <div class="size-hud-btn" onclick="modifyVideoScreenBounds(${item.id}, 'small')">📱 Small</div>
                                </div>
                            </div>

                            <div class="media-info">
                                <div class="media-title" id="display-title-render-${item.id}">${escapeSecurityHTML(item.title)}</div>
                                <div class="media-meta">Author Channel: ${escapeSecurityHTML(profileConfigState.name)}</div>
                            </div>

                            <div class="interaction-panel-track">
                                <button class="engagement-action-btn ${isLiked}" onclick="toggleCardLikeExecutionState(${item.id}, this)">
                                    👍 Like (<span id="like-counter-view-${item.id}">${item.likes}</span>)
                                </button>
                                <button class="engagement-action-btn ${isSubbed}" onclick="toggleCardSubsExecutionState(${item.id}, this)">
                                    🔔 Subscribe
                                </button>
                            </div>

                            <div class="comment-module-space">
                                <div class="comment-feed-box" id="comment-feed-target-${item.id}">
                                    ${compiledCommentsHTML || '<div style="color:#aaa; font-size:10px; padding:2px 0;">No transmission comments logged.</div>'}
                                </div>
                                <div class="comment-input-row">
                                    <input type="text" class="comment-field" id="comment-input-field-${item.id}" placeholder="Write open comment structural entry...">
                                    <button class="comment-send-trigger" onclick="dispatchGlobalCommentBroadcast(${item.id})">Send</button>
                                </div>
                            </div>
                        `;
                        targetGrid.appendChild(card);
                    });
                }
            });
        }

        function escapeSecurityHTML(str) {
            return str ? str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)) : '';
        }

        function hideThvipOverlayPreview(itemId) {
            const overlay = document.getElementById(`thvip-layer-${itemId}`);
            if (overlay) overlay.style.display = 'none';
        }

        function modifyVideoScreenBounds(itemId, modeType) {
            const wrapperBox = document.getElementById(`box-wrapper-${itemId}`);
            const videoElement = document.getElementById('video-core-node-' + itemId);
            let itemObj = dynamicLocalMemoryDB.find(i => i.id === itemId);
            if (!wrapperBox) return;

            if (modeType === 'big') {
                wrapperBox.style.height = "720px";
                if(videoElement) videoElement.style.objectFit = "contain";
            } else if (modeType === 'small') {
                if (itemObj && itemObj.type === 'short') {
                    wrapperBox.style.height = "520px";
                } else {
                    wrapperBox.style.height = "420px";
                }
                if(videoElement) videoElement.style.objectFit = "cover";
            }
        }

        function toggleCardLikeExecutionState(itemId, elementNode) {
            let itemObj = dynamicLocalMemoryDB.find(i => i.id === itemId);
            if (!itemObj) return;

            if (userEngagementRegistry.likesTrack[itemId]) {
                itemObj.likes -= 1;
                globalSystemLikesCount -= 1;
                userEngagementRegistry.likesTrack[itemId] = false;
                elementNode.classList.remove('active-fired');
            } else {
                itemObj.likes += 1;
                globalSystemLikesCount += 1;
                userEngagementRegistry.likesTrack[itemId] = true;
                elementNode.classList.add('active-fired');
            }
            document.getElementById(`like-counter-view-${itemId}`).innerText = itemObj.likes;
            forceCommitStorageSynchronizer(); // Hot persistent save sync
        }

        function toggleCardSubsExecutionState(itemId, elementNode) {
            if (userEngagementRegistry.subsTrack[itemId]) {
                globalSystemSubsCount -= 1;
                userEngagementRegistry.subsTrack[itemId] = false;
                elementNode.classList.remove('active-fired');
            } else {
                globalSystemSubsCount += 1;
                userEngagementRegistry.subsTrack[itemId] = true;
                elementNode.classList.add('active-fired');
            }
            forceCommitStorageSynchronizer(); // Hot persistent save sync
        }

        function dispatchGlobalCommentBroadcast(itemId) {
            const inputField = document.getElementById(`comment-input-field-${itemId}`);
            const textData = inputField.value.trim();
            if (textData === "") return;

            let itemObj = dynamicLocalMemoryDB.find(i => i.id === itemId);
            if (itemObj) {
                itemObj.comments.push({
                    user: profileConfigState.name,
                    text: textData
                });
                inputField.value = "";
                forceCommitStorageSynchronizer();
                rebuildStratifiedGrids(); 
            }
        }

        function setupTouchNavigationListeners() {
            const viewArea = document.getElementById('swipe-area-viewport');
            viewArea.addEventListener('touchstart', (e) => {
                touchStartCoordX = e.changedTouches[0].screenX;
                touchStartCoordY = e.changedTouches[0].screenY;
            }, { passive: true });

            viewArea.addEventListener('touchend', (e) => {
                touchEndCoordX = e.changedTouches[0].screenX;
                touchEndCoordY = e.changedTouches[0].screenY;
                evaluateTouchMovementSwipe();
            }, { passive: true });
        }

        function evaluateTouchMovementSwipe() {
            const deltaX = touchEndCoordX - touchStartCoordX;
            const deltaY = touchEndCoordY - touchStartCoordY;
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 40) {
                if (deltaX < 0) {
                    if (activeTabIndex < 2) jumpToTabSegment(activeTabIndex + 1);
                } else {
                    if (activeTabIndex > 0) jumpToTabSegment(activeTabIndex - 1);
                }
            }
        }

        function jumpToTabSegment(tabIdx) {
            activeTabIndex = tabIdx;
            document.getElementById('swipe-track').style.transform = `translateX(-${tabIdx * 100}vw)`;
            const tabsArr = ['all', 'video', 'short'];
            const pills = document.getElementsByClassName('filter-pill');
            for (let p of pills) p.classList.remove('active');
            document.getElementById(`pill-${tabsArr[tabIdx]}`).classList.add('active');
        }

        function setupFileSelectionTriggers() {
            const fileSelector = document.getElementById('media-file-selector');
            fileSelector.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    const fileObj = this.files[0];
                    selectedFileBlobUrl = URL.createObjectURL(fileObj);
                    trigger10SecondDelayedDeployment(fileObj.name);
                }
            });
        }

        function triggerDeviceMediaFileLookup(type) {
            pendingUploadType = type;
            document.getElementById('media-file-selector').click();
        }

        function trigger10SecondDelayedDeployment(fileName) {
            const container = document.getElementById('modal-box-content');
            let counterTime = 10;
            
            container.innerHTML = `
                <div class="timer-container">
                    <div class="spinner"></div>
                    <div style="font-weight:900; font-size:20px; color:#111;">Processing 4K UHD Track</div>
                    <p style="font-size:12px; color:#666; margin:6px 0 16px;">Encoding high fidelity binary blocks cleanly into standard frame grids...</p>
                    <div style="font-size:36px; font-weight:900; color:#ff0055;" id="live-countdown-clock">10s</div>
                </div>
            `;
            document.getElementById('system-modal').style.display = 'flex';

            const clockInterval = setInterval(() => {
                counterTime--;
                const clockView = document.getElementById('live-countdown-clock');
                if (clockView) clockView.innerText = `${counterTime}s`;

                if (counterTime <= 0) {
                    clearInterval(clockInterval);
                    
                    dynamicLocalMemoryDB.unshift({
                        id: Date.now(),
                        type: pendingUploadType,
                        title: "4K Live Transmission Asset",
                        url: selectedFileBlobUrl,
                        thvip: "",
                        visibility: "publish",
                        likes: 0,
                        comments: []
                    });

                    forceCommitStorageSynchronizer(); // Commit new live stream safely
                    closeSystemModal();
                    rebuildStratifiedGrids();
                }
            }, 1000);
        }

        function openVideoStructuralAdminHUD(itemId) {
            const itemObj = dynamicLocalMemoryDB.find(i => i.id === itemId);
            if (!itemObj) return;

            editStageBufferState.targetItemId = itemId;
            editStageBufferState.tempTitle = itemObj.title;
            editStageBufferState.tempVisibility = itemObj.visibility;
            editStageBufferState.tempThvipUrl = itemObj.thvip;

            renderActiveEditHUDStructure();
        }

        function renderActiveEditHUDStructure() {
            const container = document.getElementById('modal-box-content');
            const isPublishSelected = editStageBufferState.tempVisibility === 'publish' ? 'selected-status' : '';
            const isPrivateSelected = editStageBufferState.tempVisibility === 'private' ? 'selected-status' : '';

            container.innerHTML = `
                <div class="modal-header-container">
                    <div class="modal-header-text">EDIT VIDEO CONSOLE</div>
                    <button class="btn-top-save" onclick="triggerSaveConfirmationDialog()">SAVE</button>
                </div>

                <div class="input-group">
                    <label class="input-label">PUBLISH TITLE VIDEO NAME</label>
                    <input type="text" id="hud-title-editor-field" class="form-control" value="${escapeSecurityHTML(editStageBufferState.tempTitle)}" oninput="syncTitleBufferData(this)">
                </div>

                <div class="input-group">
                    <label class="input-label">THVIP (CUSTOM THUMBNAIL MANAGER)</label>
                    <button class="btn-block" style="background:#000; color:#fff; font-size:12px; padding:10px;" onclick="triggerThvipLookupWindow()">🖼️ Open THVIP File Manager</button>
                    ${editStageBufferState.tempThvipUrl ? `<div style="font-size:10px; color:#1e7e34; font-weight:bold; margin-top:5px; text-align:center;">✓ THVIP Image Attached Successfully</div>` : ''}
                </div>

                <div class="input-group">
                    <label class="input-label">VISIBILITY STREAM MATRIX LAYER</label>
                    <div class="visibility-pills-row">
                        <div class="visibility-pill-btn ${isPublishSelected}" onclick="updateVisibilityBufferTrack('publish')">PUBLISH</div>
                        <div class="visibility-pill-btn ${isPrivateSelected}" onclick="updateVisibilityBufferTrack('private')">PRIVATE</div>
                    </div>
                </div>

                <div class="modal-actions" style="margin-top:30px;">
                    <button class="btn-block btn-cancel" style="background:#dc3545; color:#fff;" onclick="triggerDismissConfirmationDialog()">DISMISS INTERFACE</button>
                </div>
            `;
            document.getElementById('system-modal').style.display = 'flex';
        }

        function syncTitleBufferData(inputNode) {
            editStageBufferState.tempTitle = inputNode.value;
        }

        function updateVisibilityBufferTrack(statusString) {
            editStageBufferState.tempVisibility = statusString;
            renderActiveEditHUDStructure();
        }

        function triggerThvipLookupWindow() {
            document.getElementById('thvip-file-selector').click();
        }

        function processThvipImageSelected(inputNode) {
            if (inputNode.files && inputNode.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    editStageBufferState.tempThvipUrl = e.target.result;
                    renderActiveEditHUDStructure();
                };
                reader.readAsDataURL(inputNode.files[0]);
            }
        }

        function triggerSaveConfirmationDialog() {
            const container = document.getElementById('modal-box-content');
            container.innerHTML = `
                <div class="timer-container" style="padding:10px;">
                    <div style="font-size:42px; margin-bottom:10px;">💾</div>
                    <div style="font-weight:900; font-size:18px; color:#111; margin-bottom:8px;">Confirm System Alterations?</div>
                    <p style="font-size:12px; color:#555; margin-bottom:20px;">Are you absolutely certain you want to write these modifications securely into backend tracks?</p>
                </div>
                <div class="modal-actions">
                    <button class="btn-block btn-cancel" onclick="renderActiveEditHUDStructure()">Back</button>
                    <button class="btn-block btn-submit" style="background:#1e7e34;" onclick="executeCommitSaveTransaction()">Confirm Save</button>
                </div>
            `;
        }

        function executeCommitSaveTransaction() {
            let itemObj = dynamicLocalMemoryDB.find(i => i.id === editStageBufferState.targetItemId);
            if (itemObj) {
                itemObj.title = editStageBufferState.tempTitle || "Untitled Track";
                itemObj.visibility = editStageBufferState.tempVisibility;
                itemObj.thvip = editStageBufferState.tempThvipUrl;
            }
            forceCommitStorageSynchronizer(); // Lock and commit data to permanent browser tracks
            closeSystemModal();
            rebuildStratifiedGrids();
        }

        function triggerDismissConfirmationDialog() {
            const container = document.getElementById('modal-box-content');
            container.innerHTML = `
                <div class="timer-container" style="padding:10px;">
                    <div style="font-size:42px; margin-bottom:10px;">⚠️</div>
                    <div style="font-weight:900; font-size:18px; color:#111; margin-bottom:8px;">Dismiss and Discard?</div>
                    <p style="font-size:12px; color:#555; margin-bottom:20px;">Warning! Dropping out now will drop all current parameter configuration overrides.</p>
                </div>
                <div class="modal-actions">
                    <button class="btn-block btn-cancel" onclick="renderActiveEditHUDStructure()">Return</button>
                    <button class="btn-block btn-submit" style="background:#dc3545;" onclick="closeSystemModal()">Confirm Dismiss</button>
                </div>
            `;
        }

        function openProfileStudioPanel() {
            const container = document.getElementById('modal-box-content');
            let uploadedHistoryHTML = "";
            let creatorClipsCount = dynamicLocalMemoryDB.length;

            if (creatorClipsCount === 0) {
                uploadedHistoryHTML = `<div style="font-size:11px; color:#aaa; text-align:center; padding:12px 0;">Studio database registry reads empty stack entries.</div>`;
            } else {
                dynamicLocalMemoryDB.forEach(item => {
                    uploadedHistoryHTML += `
                        <div class="history-item">
                            <span>🎬 ${escapeSecurityHTML(item.title)}</span>
                            <span style="color:#ff0055; font-size:10px; text-transform:uppercase; font-weight:900;">${item.type} (${item.visibility})</span>
                        </div>
                    `;
                });
            }

            container.innerHTML = `
                <div class="modal-header-container">
                    <div class="modal-header-text">Profile Studio Admin</div>
                </div>
                <div style="text-align:center;">
                    
                    <div class="profile-pic-container" onclick="triggerProfileAvatarLookup()">
                        <img src="${profileConfigState.picData}" class="profile-pic-view" id="panel-avatar-img">
                        <div style="position:absolute; bottom:0; right:0; background:#ff0055; color:#fff; width:22px; height:22px; border-radius:50%; font-size:12px; font-weight:bold; display:flex; align-items:center; justify-content:center; border:2px solid #fff;">+</div>
                    </div>

                    <div class="input-group" style="max-width:260px; margin:0 auto 12px;">
                        <input type="text" id="profile-name-modifier" class="form-control" style="text-align:center; font-weight:900; font-size:16px; padding:6px 10px; border-color:#eaeaea;" value="${escapeSecurityHTML(profileConfigState.name)}" oninput="syncProfileIdentityNameState(this)">
                    </div>

                    <div class="metric-row">
                        <div class="metric-box">
                            <div class="metric-val" id="profile-subs-counter-node">${globalSystemSubsCount}</div>
                            <div class="metric-lbl">Subscribers</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-val" id="profile-likes-counter-node">${globalSystemLikesCount}</div>
                            <div class="metric-lbl">Total Likes</div>
                        </div>
                    </div>

                    <div style="text-align:left; font-size:11px; font-weight:900; color:#222; text-transform:uppercase; margin-top:20px; letter-spacing:0.5px;">Studio Content Registries (${creatorClipsCount})</div>
                    <div class="history-list">${uploadedHistoryHTML}</div>

                </div>
                <div class="modal-actions" style="margin-top:25px;">
                    <button class="btn-block btn-cancel" style="background:#000000; color:#fff; width:100%; border-radius:10px;" onclick="closeSystemModal()">Close Studio Panel</button>
                </div>
            `;
            document.getElementById('system-modal').style.display = 'flex';
        }

        function triggerProfileAvatarLookup() {
            document.getElementById('profile-pic-selector').click();
        }

        function processAvatarFileInjected(inputNode) {
            if (inputNode.files && inputNode.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    profileConfigState.picData = e.target.result;
                    const liveAvatar = document.getElementById('panel-avatar-img');
                    if (liveAvatar) liveAvatar.src = e.target.result;
                    forceCommitStorageSynchronizer();
                    rebuildStratifiedGrids(); 
                };
                reader.readAsDataURL(inputNode.files[0]);
            }
        }

        function syncProfileIdentityNameState(inputNode) {
            const cleanName = inputNode.value.trim();
            if (cleanName !== "") {
                profileConfigState.name = cleanName;
                forceCommitStorageSynchronizer();
                const metaLabels = document.querySelectorAll('.media-meta');
                metaLabels.forEach(lbl => {
                    lbl.innerText = "Author Channel: " + cleanName;
                });
            }
        }

        function closeSystemModal() {
            document.getElementById('system-modal').style.display = 'none';
            pendingUploadType = "";
        }

        window.addEventListener('keydown', function (e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67))) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
